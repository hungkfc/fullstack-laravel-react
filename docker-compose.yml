

services:
  # Laravel App
  backend:
    build:
      context: ./learn-laravel-react
      dockerfile: Dockerfile
    container_name: laravel_backend
    restart: unless-stopped
    volumes:
      - ./learn-laravel-react:/var/www
    networks:
      - project_network
    depends_on:
      - database

  # MySQL Database
  database:
    image: mysql:8.0
    container_name: mysql_database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: book_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - project_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./learn-laravel-react:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - project_network
    depends_on:
      - backend

networks:
  project_network:
    driver: bridge

volumes:
  db_data:
